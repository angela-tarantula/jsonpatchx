[project]
site_name = "JsonPatchX"
site_description = "A PATCH framework for Python."
repo_url = "https://github.com/angela-tarantula/jsonpatchx"
repo_name = "angela-tarantula/jsonpatchx"
edit_uri = "edit/main/docs"
docs_dir = "docs"
site_dir = "site"
plugins = [
  "search",
  { mkdocstrings = { handlers = { python = { paths = ["."], options = { docstring_style = "google" } } } } },
]
nav = [
  { "Home" = "index.md" },
  { "About" = [
    { "About" = "about/about.md" },
    { "Why JsonPatchX" = "about/why-jsonpatchx.md" },
    { "Acknowledgements" = "about/acknowledgements.md" },
  ] },
  { "User Guide" = [
    { "Getting Started" = "user-guide/getting-started.md" },
    { "Registries and Routes" = "user-guide/registries-and-routes.md" },
    { "Custom Operations" = "user-guide/custom-operations.md" },
    { "Patch Clients" = "user-guide/patch-clients.md" },
    { "Patch Targeting" = "user-guide/patch-targeting.md" },
    { "Evolving PATCH Contracts" = "user-guide/evolving-patch-contracts.md" },
    { "Error Semantics" = "user-guide/error-semantics.md" },
    { "Contract Tests" = "user-guide/contract-tests.md" },
    { "Agentic Patching" = "user-guide/agentic-patching.md" },
  ] },
  { "Developer Reference" = [
    { "Developer Overview" = "developer-reference/developer-reference.md" },
    { "Local Docs Preview" = "developer-reference/developer-docs-preview.md" },
    { "Custom Pointers and Selectors" = "developer-reference/custom-pointers-and-selectors.md" },
    { "Type System Notes" = "developer-reference/type-system-notes.md" },
    { "Limitations in Python's Type System" = "developer-reference/limitations-in-python-type-system.md" },
  ] },
  { "API Reference" = [
    { "API Overview" = "api-reference/api-reference.md" },
    { "Public API" = "api-reference/api-reference-public.md" },
    { "Standard RFC 6902" = "api-reference/api-reference-standard.md" },
    { "Built-in Operations" = "api-reference/api-reference-builtins.md" },
    { "Pydantic Contracts" = "api-reference/api-reference-pydantic.md" },
    { "Registries" = "api-reference/api-reference-registries.md" },
    { "Pointers" = "api-reference/api-reference-pointers.md" },
    { "Pointer Backends" = "api-reference/api-reference-backends.md" },
    { "Operation Schema" = "api-reference/api-reference-schema.md" },
    { "JSON Types" = "api-reference/api-reference-types.md" },
    { "Exceptions" = "api-reference/api-reference-exceptions.md" },
    { "FastAPI Helpers" = "api-reference/api-reference-fastapi.md" },
  ] },
]

[project.theme]
custom_dir = "overrides"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "navigation.path",
  "navigation.tabs",
  "navigation.sections",
  "navigation.top",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/weather-night"
name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/weather-sunny"
name = "Switch to light mode"
