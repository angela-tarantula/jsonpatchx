[project]
site_name = "JsonPatchX"
site_description = "RFC 6902 JSON Patch for Python, with typed PATCH contracts for FastAPI and Pydantic"
repo_url = "https://github.com/angela-tarantula/jsonpatchx"
repo_name = "angela-tarantula/jsonpatchx"
edit_uri = "edit/main/docs"
docs_dir = "docs"
site_dir = "site"
plugins = [
  "search",
  { mkdocstrings = { handlers = { python = { paths = ["."], options = { docstring_style = "google" } } } } },
]
nav = [
  { "User Guide" = [
    { "Overview" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "PATCH Contracts in FastAPI" = "patch-contracts.md" },
    { "Custom Operations" = "custom-operations.md" },
    { "Registries and Endpoint Policy" = "operation-registries-and-endpoint-policy.md" },
    { "JSONPath and Alternative Selectors" = "jsonpath-selection.md" },
    { "Rolling Out PATCH Contracts" = "config-driven-operation-rollout.md" },
    { "Evolving Contracts" = "contract-evolution-and-deprecation.md" },
    { "Error Semantics and Contract Tests" = "error-semantics-and-contract-tests.md" },
  ] },
  { "Developer Reference" = [
    { "Developer Overview" = "developer-reference.md" },
    { "Local Docs Preview" = "developer-docs-preview.md" },
    { "Pointer Backends" = "pointer-backends.md" },
    { "Type System Notes" = "type-system-notes.md" },
  ] },
  { "API Reference" = [
    { "API Overview" = "api-reference.md" },
    { "Public API" = "api-reference-public.md" },
    { "Standard RFC 6902" = "api-reference-standard.md" },
    { "Built-in Operations" = "api-reference-builtins.md" },
    { "Pydantic Contracts" = "api-reference-pydantic.md" },
    { "Registries" = "api-reference-registries.md" },
    { "Pointers" = "api-reference-pointers.md" },
    { "Pointer Backends" = "api-reference-backends.md" },
    { "Operation Schema" = "api-reference-schema.md" },
    { "JSON Types" = "api-reference-types.md" },
    { "Exceptions" = "api-reference-exceptions.md" },
    { "FastAPI Helpers" = "api-reference-fastapi.md" },
  ] },
]

[project.theme]
custom_dir = "overrides"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "navigation.path",
  "navigation.tabs",
  "navigation.sections",
  "navigation.top",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/weather-night"
name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/weather-sunny"
name = "Switch to light mode"
