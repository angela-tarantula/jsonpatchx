repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: update-openapi-snapshots
        name: update openapi snapshots
        entry: uv run python scripts/update_openapi_snapshots.py
        language: system
        pass_filenames: false
