[project]
name = "jsonpatch"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "jsonpointer>=3.0.0",
    "pydantic>=2.12.5",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.1",
    "ruff>=0.14.7",
    "typing-extensions>=4.15.0",
]

[tool.mypy]
plugins = ["pydantic.mypy"]
python_version = "3.14"
strict = true
enable_incomplete_feature = ["TypeForm"]
exclude = ["temp.py", "jsonpatchx/tests/"]

# Extra strictness that isn't always covered by `strict`
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true

disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_decorators = true

no_implicit_optional = true # Be explicit about optionals

check_untyped_defs = true # Also type-check bodies of untyped functions

enable_error_code = [
  "type-arg",
  "no-untyped-def",
  "redundant-cast",
  "redundant-self",
  "comparison-overlap",
  "no-untyped-call",
  "no-any-return",
  "no-any-unimported",
  "unreachable",
  "deprecated",
  "redundant-expr",
  "possibly-undefined",
  "truthy-bool",
  "truthy-iterable",
  "ignore-without-code",
  "unused-awaitable",
  "unused-ignore",
  "explicit-override",
  "mutable-override",
  "unimported-reveal",
  "explicit-any",
  "exhaustive-match",
  "untyped-decorator",
]

[tool.pytest.ini_options]
pythonpath = ["."]
