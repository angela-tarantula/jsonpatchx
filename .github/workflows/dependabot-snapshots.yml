---
# Purpose: Regenerate OpenAPI snapshots on Dependabot Python dependency PRs.
name: dependabot snapshots

on:
  push:
    branches:
      - dependabot/**
    paths:
      - pyproject.toml
      - uv.lock

permissions: read-all

jobs:
  update-openapi-snapshots:
    if: startsWith(github.ref_name, 'dependabot/')
    runs-on: ubuntu-latest
    environment:
      name: "dependabot-automation"
    permissions:
      contents: write
    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Regenerate OpenAPI snapshots
        run: uv run python scripts/update_openapi_snapshots.py

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SNAPSHOT_APP_ID }}
          private-key: ${{ secrets.SNAPSHOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - name: Commit and push snapshot updates
        env:
          BRANCH: ${{ github.ref_name }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet -- tests/integration/fastapi_tests/snapshots; then
            echo "No snapshot updates needed."
            exit 0
          fi

          if [ -z "${APP_TOKEN}" ]; then
            echo "Missing app installation token."
            echo "Set repository variable SNAPSHOT_APP_ID and Dependabot secret SNAPSHOT_APP_PRIVATE_KEY."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/integration/fastapi_tests/snapshots
          git commit -m "chore: refresh OpenAPI snapshots"

          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${BRANCH}"
