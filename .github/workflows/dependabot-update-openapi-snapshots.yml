---
# Purpose: Regenerate OpenAPI snapshots on Dependabot Python dependency PRs.
name: Dependabot Update OpenAPI Snapshots

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - pyproject.toml
      - uv.lock

permissions: read-all

jobs:
  update-openapi-snapshots:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment:
      name: "dependabot-automation"
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout target ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --no-default-groups --group snapshots

      - name: Regenerate OpenAPI snapshots
        run: uv run python scripts/update_openapi_snapshots.py

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SNAPSHOT_APP_ID }}
          private-key: ${{ secrets.SNAPSHOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - name: Configure git remote with GitHub App token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >
          git remote set-url origin
          "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository
          }}.git"

      - name: Commit and push snapshot updates
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: "-A"
          message: "chore: refresh OpenAPI snapshots"
