---
# Purpose: Regenerate OpenAPI snapshots on Dependabot Python dependency PRs.
name: dependabot update OpenAPI snapshots

on:
  push:
    branches:
      - dependabot/**
    paths:
      - pyproject.toml
      - uv.lock

permissions: read-all

jobs:
  create-snapshot-app-token:
    if: startsWith(github.ref_name, 'dependabot/')
    runs-on: ubuntu-latest
    environment:
      name: "dependabot-automation"
    permissions:
      contents: read
    outputs:
      app_token: ${{ steps.app-token.outputs.token }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SNAPSHOT_APP_ID }}
          private-key: ${{ secrets.SNAPSHOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

  update-openapi-snapshots:
    if: startsWith(github.ref_name, 'dependabot/')
    needs:
      - create-snapshot-app-token
    permissions:
      contents: write
    uses: ./.github/workflows/update-openapi-snapshots.yml
    with:
      ref: ${{ github.ref }}
      branch: ${{ github.ref_name }}
      environment-name: "dependabot-automation"
    secrets:
      push-token: ${{ needs.create-snapshot-app-token.outputs.app_token }}
