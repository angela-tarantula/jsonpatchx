---
# Purpose: Regenerate OpenAPI snapshots on Dependabot Python dependency PRs.
name: Dependabot Update OpenAPI Snapshots

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - pyproject.toml
      - uv.lock

permissions: read-all

jobs:
  update-openapi-snapshots:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment:
      name: "dependabot-automation"
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SNAPSHOT_APP_ID }}
          private-key: ${{ secrets.SNAPSHOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - name: Checkout target ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --no-default-groups --group snapshots

      - name: Regenerate OpenAPI snapshots
        run: uv run python scripts/update_openapi_snapshots.py

      - name: Commit and push snapshot updates
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: "-A"
          message: "chore: refresh OpenAPI snapshots"
