---
# Purpose: Run ClusterFuzzLite on pull requests to fuzz core patch/pointer paths.
name: clusterfuzzlite PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FUZZ_STORAGE_BRANCH: fuzz-corpus

jobs:
  detect-fuzz-relevant-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      fuzz-relevant: ${{ steps.changes.outputs.fuzz_relevant }}
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Detect fuzz-relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            fuzz_relevant:
              - 'jsonpatchx/**'
              - 'fuzzers/**'
              - '.clusterfuzzlite/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/cflite_pr.yml'
              - '.github/workflows/cflite_coverage.yml'
              - '.github/workflows/cflite_weekly.yml'

  fuzz-code-changes:
    needs: detect-fuzz-relevant-changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.detect-fuzz-relevant-changes.outputs.fuzz-relevant == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group:
        cflite-pr-${{ github.event.pull_request.head.repo.full_name ||
        github.repository }}-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    permissions:
      security-events: write
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: address
          keep-unaffected-fuzz-targets: false
          storage-repo:
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
          storage-repo-branch: ${{ env.FUZZ_STORAGE_BRANCH }}
          storage-repo-branch-coverage: ${{ env.FUZZ_STORAGE_BRANCH }}

      - name: Run fuzzers (changed code)
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          language: python
          sanitizer: address
          mode: code-change
          fuzz-seconds: 300
          storage-repo:
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
          storage-repo-branch: ${{ env.FUZZ_STORAGE_BRANCH }}
          storage-repo-branch-coverage: ${{ env.FUZZ_STORAGE_BRANCH }}

  no-fuzz-relevant-changes:
    needs: detect-fuzz-relevant-changes
    if: >
      github.event_name == 'pull_request' &&
      needs.detect-fuzz-relevant-changes.outputs.fuzz-relevant != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No-op success for non-fuzz-relevant PRs
        run: |
          echo "No changes in fuzz-relevant paths."
          echo "Skipping ClusterFuzzLite PR run."
