---
# Purpose: Run ClusterFuzzLite on pull requests to fuzz core patch/pointer paths.
name: clusterfuzzlite PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FUZZ_STORAGE_BRANCH: fuzz-corpus

jobs:
  fuzz-code-changes:
    runs-on: ubuntu-latest
    concurrency:
      group:
        cflite-pr-${{ github.event.pull_request.head.repo.full_name ||
        github.repository }}-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    permissions:
      security-events: write
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Detect fuzz-relevant changes
        id: changes
        uses: step-security/paths-filter@6eee183b0d2fd101d3f8ee2935c127bca14c5625 # v3.0.5
        with:
          filters: |
            fuzz_relevant:
              - 'jsonpatchx/**'
              - 'fuzzers/**'
              - '.clusterfuzzlite/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/cflite_pr.yml'
              - '.github/workflows/cflite_coverage.yml'
              - '.github/workflows/cflite_weekly.yml'

      # Skip the rest of the workflow if no fuzz-relevant paths were changed.
      # This avoids unnecessary builds and fuzz runs for documentation updates, CI config tweaks, etc.

      - name: Skip fuzzing for non-fuzz-relevant PRs
        if: >
          github.event_name == 'pull_request' &&
          steps.changes.outputs.fuzz_relevant != 'true'
        run: |
          echo "No changes in fuzz-relevant paths."
          echo "Skipping ClusterFuzzLite PR run."

      # Continue with checkout, build, and fuzzing steps if this is a workflow_dispatch event
      # or if fuzz-relevant paths were changed.

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.fuzz_relevant == 'true'
        with:
          persist-credentials: false

      - name: Build fuzzers
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.fuzz_relevant == 'true'
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: address
          keep-unaffected-fuzz-targets: false
          storage-repo:
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
          storage-repo-branch: ${{ env.FUZZ_STORAGE_BRANCH }}
          storage-repo-branch-coverage: ${{ env.FUZZ_STORAGE_BRANCH }}

      - name: Run fuzzers (changed code)
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.fuzz_relevant == 'true'
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          language: python
          sanitizer: address
          mode: code-change
          fuzz-seconds: 300
          storage-repo:
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
          storage-repo-branch: ${{ env.FUZZ_STORAGE_BRANCH }}
          storage-repo-branch-coverage: ${{ env.FUZZ_STORAGE_BRANCH }}
