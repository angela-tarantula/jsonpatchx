---
name: dependency

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: read-all

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🔂 dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: "high"
          # Explicit allow-list so license policy remains auditable in-repo.
          allow-licenses:
            "Apache-2.0, MIT, MIT-0, BSD-2-Clause, BSD-3-Clause, MPL-2.0, 0BSD,
            Python-2.0, Python-2.0.1, GPL-1.0-or-later"
          # Version-pinned exceptions for deps with unknown license detection.
          allow-dependencies-licenses:
            "pkg:pypi/jsonpointer@3.1.0, pkg:pypi/pytest-cov@7.1.0,
            pkg:pypi/ruff@0.15.7, pkg:pypi/uvicorn@0.42.0,
            pkg:pypi/pyinstaller@6.19.0, pkg:pypi/python-jsonpath@2.0.2,
            pkg:pypi/pyinstaller-hooks-contrib@2026.3, pkg:pypi/uv@0.10.12"
          # deny-licenses: "AGPL-1.0, AGPL-3.0"
          comment-summary-in-pr: true
          warn-on-openssf-scorecard-level: 3
          # Manual runs can validate the full dependency graph against the
          # allow-list by diffing from the repository root commit.
          # The `|| ''` fallback ensures non-dispatch events pass empty inputs
          # instead of a boolean `false`, for compatibility.
          base-ref:
            ${{ github.event_name == 'workflow_dispatch' &&
            '0b050f80f5c9a8a756463b0ce86b26e1e034531c' || '' }}
          head-ref:
            ${{ github.event_name == 'workflow_dispatch' && github.sha || '' }}
