---
# Purpose: Manually audit the full dependency graph against repository policy.
name: Dependency Review Full Audit

on:
  workflow_dispatch:

permissions: read-all

jobs:
  dependency-review-full-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine repository root commit
        id: root-commit
        shell: bash
        run: |
          set -euo pipefail
          root_commit="$(git rev-list --max-parents=0 --reverse HEAD | head -n1)"
          echo "base_ref=${root_commit}" >> "${GITHUB_OUTPUT}"

      - name: 🔂 dependency review (full graph)
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Centralized dependency license policy lives in this config file.
          config-file: ./.github/dependency-review-config.yml
          fail-on-severity: "high"
          comment-summary-in-pr: false
          warn-on-openssf-scorecard-level: 3
          # Diff from repository root commit to current SHA to force a full-graph audit.
          base-ref: ${{ steps.root-commit.outputs.base_ref }}
          head-ref: ${{ github.sha }}
