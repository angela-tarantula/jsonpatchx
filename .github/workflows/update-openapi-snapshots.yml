---
# Purpose: Reusable job to regenerate and commit OpenAPI snapshots using a caller-provided token.
name: update OpenAPI snapshots reusable

on:
  workflow_call:
    secrets:
      push-token:
        description: Token with contents:write permission for pushing commits.
        required: true
    inputs:
      environment-name:
        description: Environment name used for secret-scoped execution.
        required: true
        type: string

permissions: read-all

jobs:
  update-openapi-snapshots:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment-name }}
    permissions:
      contents: write
    steps:
      - name: Checkout target ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.push-token }}
          persist-credentials: true

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --no-default-groups --group snapshots

      - name: Regenerate OpenAPI snapshots
        run: uv run python scripts/update_openapi_snapshots.py

      - name: Commit and push snapshot updates
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: "--all examples/openapi/*.json"
          message: "chore: refresh OpenAPI snapshots"
