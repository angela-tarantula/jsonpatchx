---
# Purpose: Reusable job to regenerate and commit OpenAPI snapshots using a caller-provided token.
name: update OpenAPI snapshots reusable

on:
  workflow_call:
    secrets:
      push-token:
        description: Token with contents:write permission for pushing commits.
        required: true
    inputs:
      environment-name:
        description: Environment name used for secret-scoped execution.
        required: true
        type: string
      snapshot-path: # TODO: make the python script configurable like this too
        description: Path containing generated OpenAPI snapshot artifacts.
        required: false
        default: tests/integration/fastapi_tests/snapshots
        type: string
      commit-message:
        description: Commit message for refreshed snapshot artifacts.
        required: false
        default: "chore: refresh OpenAPI snapshots"
        type: string

permissions: read-all

jobs:
  update-openapi-snapshots:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment-name }}
    permissions:
      contents: write
    steps:
      - name: Checkout target ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --no-default-groups --group snapshots

      - name: Regenerate OpenAPI snapshots
        run: uv run python scripts/update_openapi_snapshots.py

      - name: Commit and push snapshot updates
        env:
          BRANCH: ${{ github.ref_name }}
          PUSH_TOKEN: ${{ secrets.push-token }}
          SNAPSHOT_PATH: ${{ inputs.snapshot-path }}
          COMMIT_MESSAGE: ${{ inputs.commit-message }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "${SNAPSHOT_PATH}"; then
            echo "No snapshot updates needed."
            exit 0
          fi

          if [ -z "${PUSH_TOKEN}" ]; then
            echo "Missing push token."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${SNAPSHOT_PATH}"
          git commit -m "${COMMIT_MESSAGE}"

          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${BRANCH}"
