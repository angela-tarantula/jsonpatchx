---
name: dependency

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: read-all

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🔂 dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Centralized dependency license policy lives in this config file.
          config-file: ./.github/dependency-review-config.yml
          fail-on-severity: "high"
          comment-summary-in-pr: true
          warn-on-openssf-scorecard-level: 3
          # Manual runs can validate the full dependency graph against the
          # allow-list by diffing from the repository root commit.
          # The `|| ''` fallback ensures non-dispatch events pass empty inputs
          # instead of a boolean `false`, for compatibility.
          base-ref:
            ${{ github.event_name == 'workflow_dispatch' &&
            '0b050f80f5c9a8a756463b0ce86b26e1e034531c' || '' }}
          head-ref:
            ${{ github.event_name == 'workflow_dispatch' && github.sha || '' }}
