---
# Purpose: Weekly whole-repo ClusterFuzzLite run for broader bug discovery.
name: clusterfuzzlite weekly

on:
  schedule:
    - cron: "30 2 * * 0"
  workflow_dispatch:

permissions: read-all

env:
  FUZZ_STORAGE_BRANCH: fuzz-corpus

jobs:
  fuzz-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build fuzzers (all targets)
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: address
          keep-unaffected-fuzz-targets: true
          storage-repo:
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
          storage-repo-branch: ${{ env.FUZZ_STORAGE_BRANCH }}
          storage-repo-branch-coverage: ${{ env.FUZZ_STORAGE_BRANCH }}

      - name: Run fuzzers (batch, 1 hour)
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          language: python
          sanitizer: address
          mode: batch
          fuzz-seconds: 3600
          storage-repo:
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
          storage-repo-branch: ${{ env.FUZZ_STORAGE_BRANCH }}
          storage-repo-branch-coverage: ${{ env.FUZZ_STORAGE_BRANCH }}
