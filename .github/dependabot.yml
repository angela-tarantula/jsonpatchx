---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/*"
          - "github/*"
      github-owned-actions:
        patterns:
          - "actions/*"
          - "github/*"
    schedule:
      interval: "weekly"

  - package-ecosystem: "uv"
    directory: "/"
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pre-commit"
    directory: "/"
    cooldown:
      default-days: 7
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
