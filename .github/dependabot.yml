---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/*"
          - "github/*"
      github-owned-actions:
        patterns:
          - "actions/*"
          - "github/*"
    schedule:
      interval: "monthly"

  - package-ecosystem: "uv"
    directory: "/"
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
    schedule:
      interval: "monthly"

  - package-ecosystem: "pre-commit"
    directory: "/"
    cooldown:
      default-days: 7
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
    schedule:
      interval: "monthly"

  # .clusterfuzzlite/requirements-bootstrap.txt.
  - package-ecosystem: "pip"
    directory: "/.clusterfuzzlite"
    cooldown:
      default-days: 7
    groups:
      clusterfuzzlite-pip:
        patterns:
          - "*"
    schedule:
      interval: "monthly"
